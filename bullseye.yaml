schema_version: 1
targets:
  T1:
    name: "Convergence evaluation is practical for daily use"
    status: converging
    value: 1.0
    cost: 1.0
    acceptance:
    - "Scan tier: 1 tool call (gather script only). No codebase investigation. Output fits in a short summary paragraph."
    - "Default tier: ≤15 tool calls for up to 15 active targets. Deep-evaluates only the top 2-3 by priority; rest are status + change hints. Total context consumed by the evaluation (gather output + investigation results) stays under ~8k tokens — less than 10% of a typical session window."
    - "Full tier: Unbounded tool calls, explicitly opt-in. Expected only at milestone boundaries."
    - "No tier blocks on external API calls unless the target's criteria explicitly require it (CI status uses cached gather data)."
    - "Empirical baseline: 8 targets, default tier, 3 tool calls (2026-03-04). Revisit if real-world usage consistently exceeds budgets."
    context: "The convergence system only works if it's cheap enough to run routinely. If `/converge` costs as much as a work session, people won't run it. The context-size constraint matters as much as tool-call count — a single grep returning 2k lines burns more budget than 10 targeted checks."
    discovered: "2026-03-04"
  T1.1:
    name: "Default evaluation deeply investigates only top targets"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "`/converge` (default tier) fully evaluates only the top 2-3 targets by priority. Remaining targets are assessed from status fields and change-hint overlap. The skill definition explicitly specifies this tiered behaviour."
    context: "Evaluating every target on every run is O(n) in tool calls and context. Most runs only need to deeply assess the targets likely to be recommended — the rest just need a staleness check."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T1.2:
    name: "Gather script provides change hints"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "`gather.sh` emits a `changed-files` section listing files changed since the last evaluation SHA (stored in targets.md). `/converge` uses this to flag targets whose domain may be affected without running greps."
    context: "Level-triggered evaluation is correct but expensive. A hybrid approach that uses change sets as hints for where to focus captures most of the benefit at a fraction of the cost."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T1.3:
    name: "Acceptance criteria have evaluable cost classification"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "The `/target` skill guidance recommends writing grep-checkable criteria where possible. The `/converge` skill documentation describes three cost categories (grep-checkable, ci-checkable, review-required) and how each is handled per tier."
    context: "Some criteria are a single grep; others require reading dozens of files for architectural judgement. Knowing the cost upfront lets `/converge` skip expensive evaluations in lighter tiers."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T1.4:
    name: "Implied target checks are amortized across targets"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "Git state, PR list, and CI status are gathered once by `gather.sh` and matched to all targets by `/converge`, not queried per-target. The gather script has a single `git-state` section used for all implied delivery checks."
    context: "Checking delivery status per-target means N API calls for N targets. Gathering once and matching is O(1) in API calls."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T1.5:
    name: "Achieved targets don't accumulate unboundedly in context"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "The `/target` skill documents an archival policy: achieved targets older than 30 days rotate to `## Archive` or a separate file. Gather script only emits `## Active` and `## Achieved` sections. The archival guideline is in the SKILL.md."
    context: "A project running for months could accumulate dozens of achieved targets. Each consumes context on every gather. Archival keeps context bounded while preserving history."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T1.6:
    name: "Re-evaluation happens at decision boundaries, not continuously"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "The `/converge` skill documentation and CLAUDE.md directive specify when to evaluate: session start, run completion, blockage. Mid-work re-evaluation is explicitly discouraged. The stash skill prompts for target status reflection (cheap) not full convergence evaluation (expensive)."
    context: "Replanning has a cost (Ishida/Korf). The optimal strategy is to replan when the expected value of the new plan exceeds the replanning cost. For most small work increments, a status-field update suffices."
    depends_on:
    - T1
    discovered: "2026-03-04"
    achieved: "2026-03-04"
  T2:
    name: "Value and cost scales are calibrated across projects and time"
    status: identified
    value: 10.0
    cost: 2.0
    acceptance:
    - "The system defines reference points for value and cost so that weight 4 means roughly the same thing in project A as in project B, and the same thing in March as in September. An agent assigning weight can anchor against these reference points rather than inventing a scale each time."
    context: "Without calibration, value and cost are local to the moment of assignment. A weight of 6 in one project might reflect careful reasoning against known anchors; in another it's a guess with no frame of reference. Over time, scale drift makes weights across projects incomparable and even within a project the numbers lose meaning as the implicit scale shifts. This doesn't need to be heavy — a few reference points (e.g., 'cost 1 = a focused session, cost 5 = a multi-day effort; value 1 = nice to have, value 10 = blocks a release') would anchor the scale. The question is where these live and how they stay consistent."
    discovered: "2026-03-04"
  T3:
    name: "Convergence system has a comprehensive design report"
    status: achieved
    value: 1.0
    cost: 1.0
    acceptance:
    - "`docs/reports/desired-state-convergence.md` exists, covers theoretical foundations (≥7 domains), design principles, system mechanics, comparisons with alternatives, optimization analysis, and full bibliography."
    context: "The design rationale and literature review serves as the intellectual foundation for the system and helps future contributors understand why things are the way they are."
    discovered: "2026-03-04"
    achieved: "2026-03-04"
